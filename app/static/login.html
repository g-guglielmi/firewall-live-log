<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Firewall Live Log</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root {
  color-scheme: light;
  --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink-2:#52514e;
  --muted:#898781; --border:rgba(11,11,11,0.12); --accent:#2a78d6;
  --critical:#d03b3b; --tint-bad:rgba(208,59,59,0.08);
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) {
    color-scheme: dark;
    --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink-2:#c3c2b7;
    --muted:#898781; --border:rgba(255,255,255,0.12); --accent:#3987e5;
    --tint-bad:rgba(230,103,103,0.15);
  }
}
* { box-sizing:border-box; }
body { margin:0; background:var(--page); color:var(--ink); min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:24px;
  font:14px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; }
.card { background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:28px 26px; width:100%; max-width:360px; }
.brand { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.brand img { width:34px; height:34px; }
h1 { font-size:17px; margin:0; font-weight:650; }
.sub { color:var(--muted); font-size:12.5px; margin:2px 0 20px; }
label { display:block; font-size:12.5px; color:var(--ink-2); margin:14px 0 5px; }
input { width:100%; font:inherit; color:var(--ink); background:var(--page);
  border:1px solid var(--border); border-radius:9px; padding:9px 11px; }
input:focus { outline:2px solid var(--accent); outline-offset:0; border-color:transparent; }
button { width:100%; margin-top:20px; font:inherit; font-weight:600;
  color:#fff; background:var(--accent); border:0; border-radius:9px;
  padding:10px 12px; cursor:pointer; }
button:disabled { opacity:.6; cursor:default; }
.msg { display:none; margin-top:16px; padding:9px 11px; border-radius:9px;
  background:var(--tint-bad); border:1px solid var(--critical); font-size:13px; }
.note { color:var(--muted); font-size:11.5px; margin-top:18px; text-align:center; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <img src="/favicon.png" alt="">
    <h1>Firewall Live Log</h1>
  </div>
  <div class="sub">Sign in to view the dashboard.</div>
  <form id="loginForm" autocomplete="on">
    <label for="u">Username</label>
    <input id="u" name="username" type="text" autocomplete="username"
           autofocus required maxlength="64">
    <label for="p">Password</label>
    <input id="p" name="password" type="password"
           autocomplete="current-password" required maxlength="1024">
    <button id="submit" type="submit">Sign in</button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="note">Sessions expire after 12 hours of validity.</div>
</div>
<script>
"use strict";
const $ = id => document.getElementById(id);
const form = $("loginForm"), msg = $("msg"), btn = $("submit");
function show(text) { msg.textContent = text; msg.style.display = "block"; }
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msg.style.display = "none";
  btn.disabled = true;
  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: $("u").value, password: $("p").value })
    });
    let data = {};
    try { data = await res.json(); } catch (_) {}
    if (res.ok) {
      window.location.replace("/");
      return;
    }
    if (res.status === 429) {
      const ra = res.headers.get("Retry-After");
      show((data.error || "Too many attempts.") +
           (ra ? " Try again in " + Math.ceil(ra / 60) + " min." : ""));
    } else {
      show(data.error || "Sign in failed.");
    }
  } catch (err) {
    show("Network error — please try again.");
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
