<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset password · Firewall Live Log</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root {
  color-scheme: light;
  --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink-2:#52514e;
  --muted:#898781; --border:rgba(11,11,11,0.12); --accent:#2a78d6;
  --good:#0ca30c; --tint-good:rgba(12,163,12,0.07);
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) {
    color-scheme: dark;
    --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink-2:#c3c2b7;
    --muted:#898781; --border:rgba(255,255,255,0.12); --accent:#3987e5;
    --good:#0ca30c; --tint-good:rgba(12,163,12,0.13);
  }
}
* { box-sizing:border-box; }
body { margin:0; background:var(--page); color:var(--ink); min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:24px;
  font:14px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; }
.card { background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:28px 26px; width:100%; max-width:380px; }
.brand { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.brand img { width:34px; height:34px; }
h1 { font-size:17px; margin:0; font-weight:650; }
.sub { color:var(--muted); font-size:12.5px; margin:2px 0 20px; }
label { display:block; font-size:12.5px; color:var(--ink-2); margin:14px 0 5px; }
input { width:100%; font:inherit; color:var(--ink); background:var(--page);
  border:1px solid var(--border); border-radius:9px; padding:9px 11px; }
input:focus { outline:2px solid var(--accent); outline-offset:0; border-color:transparent; }
button { width:100%; margin-top:20px; font:inherit; font-weight:600;
  color:#fff; background:var(--accent); border:0; border-radius:9px;
  padding:10px 12px; cursor:pointer; }
button:disabled { opacity:.6; cursor:default; }
.msg { display:none; margin-top:16px; padding:9px 11px; border-radius:9px;
  background:var(--tint-good); border:1px solid var(--good); font-size:13px; }
.links { margin-top:18px; text-align:center; font-size:12.5px; }
a { color:var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <img src="/favicon.png" alt="">
    <h1>Reset your password</h1>
  </div>
  <div class="sub">Enter your username or email. If an account matches and
    has an email on file, we'll send a reset link.</div>
  <form id="forgotForm">
    <label for="id">Username or email</label>
    <input id="id" name="username_or_email" type="text" autofocus required
           maxlength="254" autocomplete="username">
    <button id="submit" type="submit">Send reset link</button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="links"><a href="/login">← Back to sign in</a></div>
</div>
<script>
"use strict";
const $ = id => document.getElementById(id);
const form = $("forgotForm"), msg = $("msg"), btn = $("submit");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btn.disabled = true;
  try {
    const res = await fetch("/api/forgot_password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username_or_email: $("id").value })
    });
    let data = {};
    try { data = await res.json(); } catch (_) {}
    msg.textContent = data.message ||
      "If an account exists, a reset link has been sent.";
    msg.style.display = "block";
    form.querySelector("input").disabled = true;
  } catch (err) {
    msg.textContent = "If an account exists, a reset link has been sent.";
    msg.style.display = "block";
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
