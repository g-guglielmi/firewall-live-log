<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Firewall Live Log</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root {
  color-scheme: light;
  --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink-2:#52514e;
  --muted:#898781; --grid:#e1e0d9; --baseline:#c3c2b7;
  --border:rgba(11,11,11,0.10); --accent:#2a78d6;
  --good:#0ca30c; --critical:#d03b3b; --serious:#ec835a; --warning:#fab219;
  --nat:#2a78d6;
  --tint-good:rgba(12,163,12,0.07); --tint-bad:rgba(208,59,59,0.08);
  --tint-nat:rgba(42,120,214,0.09);
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) {
    color-scheme: dark;
    --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink-2:#c3c2b7;
    --muted:#898781; --grid:#2c2c2a; --baseline:#383835;
    --border:rgba(255,255,255,0.10); --accent:#3987e5;
    --nat:#4b93ea;
    --tint-good:rgba(12,163,12,0.13); --tint-bad:rgba(230,103,103,0.15);
    --tint-nat:rgba(58,135,229,0.16);
  }
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink-2:#c3c2b7;
  --muted:#898781; --grid:#2c2c2a; --baseline:#383835;
  --border:rgba(255,255,255,0.10); --accent:#3987e5;
  --nat:#4b93ea;
  --tint-good:rgba(12,163,12,0.13); --tint-bad:rgba(230,103,103,0.15);
  --tint-nat:rgba(58,135,229,0.16);
}
* { box-sizing:border-box; }
body { margin:0; background:var(--page); color:var(--ink);
  font:14px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; }
.wrap { max-width:1400px; margin:0 auto; padding:18px 22px 60px; }
header { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
h1 { font-size:18px; margin:0; font-weight:650; }
h2 { font-size:14px; font-weight:650; margin:22px 0 10px; }
.sub { color:var(--muted); font-size:12.5px; }
.spacer { flex:1; }
button,.btn { font:inherit; color:var(--ink); background:var(--surface);
  border:1px solid var(--border); border-radius:8px; padding:6px 12px;
  cursor:pointer; text-decoration:none; display:inline-block; }
button:hover,.btn:hover { border-color:var(--baseline); }
.error-banner { background:var(--tint-bad); border:1px solid var(--critical);
  border-radius:10px; padding:8px 12px; margin-bottom:12px; display:none; }

/* status dot + pill (shared) */
.dot { width:9px; height:9px; border-radius:50%; flex:none; display:inline-block; }
.s-receiving { background:var(--good); }
.s-quiet     { background:var(--warning); }
.s-stale     { background:var(--critical); }
.s-nodata    { background:var(--muted); }
.pill { display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
  font-size:12px; border:1px solid var(--border); border-radius:999px; padding:2px 9px; }

/* tab bar */
.tabs { display:flex; gap:4px; flex-wrap:wrap; margin:0 0 16px;
  border-bottom:1px solid var(--grid); padding-bottom:0; }
.tab { border:1px solid transparent; background:transparent; border-radius:8px 8px 0 0;
  padding:7px 12px; color:var(--ink-2); font-weight:600; display:inline-flex;
  align-items:center; gap:7px; }
.tab:hover { color:var(--ink); }
.tab.active { color:var(--ink); background:var(--surface);
  border-color:var(--border); border-bottom-color:var(--surface);
  margin-bottom:-1px; }

/* overview */
.tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:16px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
.tile .v { font-size:24px; font-weight:650; margin-top:2px; }
.tile .l { color:var(--ink-2); font-size:12px; }
.tile .s { color:var(--muted); font-size:11.5px; margin-top:2px; }
.sys-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
.sys-card { background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:14px 15px; cursor:pointer; transition:border-color .1s; }
.sys-card:hover { border-color:var(--accent); }
.sys-card.receiving { box-shadow:inset 3px 0 0 var(--good); }
.sys-card.quiet { box-shadow:inset 3px 0 0 var(--warning); }
.sys-card.stale, .sys-card.nodata { box-shadow:inset 3px 0 0 var(--critical); }
.sys-card .name { font-weight:650; font-size:15px; }
.sys-card .meta { color:var(--muted); font-size:12px; margin-top:2px; }
.sys-card .row { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
.sys-card .rate { font-variant-numeric:tabular-nums; }
.sys-card .big { font-size:20px; font-weight:650; }

/* system live view */
.sysbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
.sysbar .title { font-size:16px; font-weight:650; }
.sysbar label { color:var(--ink-2); font-size:12.5px; display:inline-flex; gap:5px; align-items:center; }
/* separate (not collapse) so the sticky header keeps its own background and
   bottom border and layers above the scrolling rows instead of letting them
   bleed on top */
table { border-collapse:separate; border-spacing:0; width:100%; font-size:13px; }
th,td { text-align:left; padding:5px 9px; border-bottom:1px solid var(--grid); vertical-align:top; }
th { color:var(--ink-2); font-weight:600; font-size:12px; white-space:nowrap;
  position:sticky; top:0; background:var(--surface); z-index:3; }
/* per-column filter controls that live inside the header cells */
.colf { display:block; width:100%; margin-top:5px; font:inherit; font-size:12px;
  font-weight:400; color:var(--ink); background:var(--page);
  border:1px solid var(--border); border-radius:6px; padding:3px 6px; }
.colf:focus { outline:2px solid var(--accent); outline-offset:0; border-color:transparent; }
th.num .colf { text-align:right; }
#fSrc, #fDst, #fRule { min-width:120px; }
/* keep Proto and Port compact instead of absorbing slack width */
th.narrow { width:1%; }
#fProto { width:76px; }
#fPort { width:92px; }
td.mono,td.ip,td.port { font-family:ui-monospace,"Cascadia Mono",Menlo,monospace; font-size:12.5px; }
td.num,th.num { text-align:right; font-variant-numeric:tabular-nums; }
.table-scroll { overflow-x:auto; max-height:68vh; overflow-y:auto; }
tbody tr.ev-allow td { background:var(--tint-good); }
tbody tr.ev-block td { background:var(--tint-bad); }
tbody tr.ev-nat td { background:var(--tint-nat); }
.badge { display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
.empty-note { color:var(--muted); padding:18px 4px; }
.loadmore { display:none; align-items:center; justify-content:center; gap:10px;
  margin-top:10px; }
.loadmore .sub { color:var(--muted); font-size:12px; }

/* user menu (avatar + dropdown) + modal (auth) */
.usermenu { position:relative; display:inline-block; }
.avatar-btn { display:inline-flex; align-items:center; gap:3px; background:none;
  border:0; padding:1px; cursor:pointer; border-radius:999px; }
.avatar-btn:hover { border:0; }
.avatar { width:28px; height:28px; border-radius:50%; background:var(--accent);
  color:#fff; display:inline-flex; align-items:center; justify-content:center;
  font-weight:650; font-size:13px; text-transform:uppercase; }
.avatar-btn svg { width:14px; height:14px; color:var(--muted); }
.menu { position:absolute; right:0; top:calc(100% + 8px); min-width:230px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.22); padding:6px; display:none; z-index:60; }
.menu.open { display:block; }
.menu-id { padding:9px 11px 6px; }
.menu-id .nm { font-weight:650; }
.menu-id .rl { font-size:11px; border:1px solid var(--border); border-radius:999px;
  padding:1px 8px; color:var(--ink-2); margin-left:6px; }
.menu-id .em { color:var(--muted); font-size:12px; margin-top:4px; word-break:break-all; }
.menu-sep { height:1px; background:var(--grid); margin:6px 4px; }
.menu-item { display:block; width:100%; text-align:left; background:none;
  border:0; border-radius:8px; padding:8px 11px; font:inherit; color:var(--ink);
  cursor:pointer; }
.menu-item:hover { background:var(--page); border:0; }
.menu-item.danger { color:var(--critical); }
.linkbtn { background:none; border:0; padding:0; color:var(--accent);
  cursor:pointer; font:inherit; }
.linkbtn:hover { text-decoration:underline; }
.modal-back { position:fixed; inset:0; background:rgba(0,0,0,0.45);
  display:none; align-items:flex-start; justify-content:center; z-index:50;
  padding:40px 16px; overflow-y:auto; }
.modal-back.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:20px 22px; width:100%; max-width:560px; }
.modal h3 { margin:0 0 4px; font-size:16px; }
.modal .sub { margin-bottom:14px; }
.modal label { display:block; font-size:12.5px; color:var(--ink-2); margin:12px 0 4px; }
.modal input, .modal select { width:100%; font:inherit; color:var(--ink);
  background:var(--page); border:1px solid var(--border); border-radius:9px; padding:8px 10px; }
.modal .row2 { display:flex; gap:10px; flex-wrap:wrap; }
.modal .row2 > div { flex:1; min-width:140px; }
.modal .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }
.modal button.primary { color:#fff; background:var(--accent); border:0; }
.modal .msg { display:none; margin-top:12px; padding:8px 11px; border-radius:9px;
  background:var(--tint-bad); border:1px solid var(--critical); font-size:12.5px; }
.modal .msg.ok { background:var(--tint-good); border-color:var(--good); }
.utable { width:100%; margin-top:8px; }
.utable td, .utable th { padding:6px 8px; border-bottom:1px solid var(--grid); font-size:13px; }
.rolesel { width:auto; padding:3px 7px; font-size:12.5px; }
.tag { font-size:11px; border:1px solid var(--border); border-radius:999px; padding:1px 8px; color:var(--ink-2); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Firewall Live Log</h1>
    <span class="sub" id="updated">loading…</span>
    <span class="spacer"></span>
    <span class="pill" id="fleetPill"><span class="dot s-nodata"></span> —</span>
    <span class="usermenu" id="userbar" style="display:none">
      <button class="avatar-btn" id="userMenuBtn" aria-haspopup="true"
              aria-expanded="false" title="Account">
        <span class="avatar" id="avatar">?</span>
        <svg viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor"
          d="M4 6l4 4 4-4z"></path></svg>
      </button>
      <div class="menu" id="userMenu" role="menu">
        <div class="menu-id">
          <div><span class="nm" id="who"></span></div>
          <div class="em" id="whoEmail"></div>
        </div>
        <div class="menu-sep"></div>
        <button class="menu-item" id="usersBtn" role="menuitem" style="display:none">Manage users</button>
        <button class="menu-item" id="emailBtn" role="menuitem">Set email</button>
        <button class="menu-item" id="pwBtn" role="menuitem">Change password</button>
        <div class="menu-sep"></div>
        <button class="menu-item danger" id="logoutBtn" role="menuitem">Log out</button>
      </div>
    </span>
  </header>

  <div class="error-banner" id="banner"></div>
  <nav class="tabs" id="tabs"></nav>

  <!-- Overview -->
  <div id="page-overview">
    <div class="tiles" id="tiles"></div>
    <h2>Systems</h2>
    <div class="sys-grid" id="sysGrid"></div>
  </div>

  <!-- Single-system live log (reused for whichever system is selected) -->
  <div id="page-system" style="display:none">
    <div class="sysbar">
      <button id="backBtn">← Overview</button>
      <span class="title" id="sysTitle"></span>
      <span class="pill" id="sysStatus"></span>
      <span class="sub" id="sysMeta"></span>
      <span class="spacer"></span>
      <label><input type="checkbox" id="fPause"> pause</label>
      <button id="fClear">Clear filters</button>
      <a class="btn" id="csvLink" href="#">Download CSV</a>
      <span class="sub" id="meta"></span>
    </div>
    <div class="card table-scroll">
      <table id="log">
        <thead><tr>
          <th>Time
            <select id="fMode" class="colf" title="Live tail, or a historical window from the retained data">
              <option value="live">● Live</option>
              <option value="3600">Last 1 hour</option>
              <option value="86400">Last 24 hours</option>
              <option value="604800">Last 7 days</option>
            </select>
          </th>
          <th>Source IP<input type="text" class="colf" id="fSrc" placeholder="filter…"
            title="Substring match. Prefix with ! to exclude (e.g. !10.0.0.5)."></th>
          <th>Destination IP<input type="text" class="colf" id="fDst" placeholder="filter…"
            title="Substring match. Prefix with ! to exclude (e.g. !10.55.37.255)."></th>
          <th class="narrow">Proto<input type="text" class="colf" id="fProto" placeholder="filter…"
            title="e.g. UDP. Prefix with ! to exclude (e.g. !UDP)."></th>
          <th class="num narrow">Port<input type="text" class="colf" id="fPort" placeholder="443 / =80"
            title="Prefix: 44 finds 443/445. =80 exact. ! to exclude (!137, !=80)."></th>
          <th>Action
            <select id="fAct" class="colf">
              <option value="">all</option>
              <option value="Allow">allowed</option>
              <option value="blocked">blocked</option>
              <option value="NAT">NAT / forward</option>
            </select>
          </th>
          <th>Rule<input type="text" class="colf" id="fRule" placeholder="filter…"
            title="Substring match. Prefix with ! to exclude."></th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="loadmore" id="loadMoreBar">
      <button id="loadOlderBtn">Load older</button>
      <span class="sub" id="loadMoreNote"></span>
    </div>
  </div>
</div>

<!-- Change-password modal -->
<div class="modal-back" id="pwModal">
  <div class="modal">
    <h3>Change your password</h3>
    <div class="sub">You'll be signed out and asked to log in again.</div>
    <label for="pwCur">Current password</label>
    <input id="pwCur" type="password" autocomplete="current-password" maxlength="1024">
    <label for="pwNew">New password (min 12 characters)</label>
    <input id="pwNew" type="password" autocomplete="new-password" maxlength="1024">
    <label for="pwNew2">Confirm new password</label>
    <input id="pwNew2" type="password" autocomplete="new-password" maxlength="1024">
    <div class="msg" id="pwMsg"></div>
    <div class="actions">
      <button id="pwCancel">Cancel</button>
      <button class="primary" id="pwSave">Save</button>
    </div>
  </div>
</div>

<!-- User-management modal (admin) -->
<div class="modal-back" id="usersModal">
  <div class="modal">
    <h3>Users</h3>
    <div class="sub">Create and remove dashboard accounts.</div>
    <table class="utable"><tbody id="userRows"></tbody></table>
    <h3 style="margin-top:18px;font-size:14px">Add a user</h3>
    <div class="row2">
      <div>
        <label for="nuName">Username</label>
        <input id="nuName" type="text" maxlength="64" autocomplete="off">
      </div>
      <div>
        <label for="nuRole">Role</label>
        <select id="nuRole">
          <option value="user">user (view only)</option>
          <option value="admin">admin (can manage users)</option>
        </select>
      </div>
    </div>
    <label for="nuEmail">Email (optional — needed for self-service reset)</label>
    <input id="nuEmail" type="email" maxlength="254" autocomplete="off">
    <label for="nuPass">Password (min 12 characters)</label>
    <input id="nuPass" type="text" maxlength="1024" autocomplete="off">
    <div class="msg" id="usersMsg"></div>
    <div class="actions">
      <button id="usersClose">Close</button>
      <button class="primary" id="nuCreate">Create user</button>
    </div>
  </div>
</div>

<script>
"use strict";
const ACTION_COLOR = { Allow:"var(--good)", Block:"var(--critical)",
  Drop:"var(--critical)", Reject:"var(--serious)", NAT:"var(--nat)",
  "?":"var(--muted)" };
const VENDOR_LABEL = { unifi:"UniFi", sophos:"Sophos", auto:"auto" };
const BLOCKED = new Set(["Block","Drop","Reject"]);
const KEEP = 3000, SHOW = 600;
const WINDOW_BATCH = 2000, WINDOW_MAX = 10000;  // per-page / on-screen caps for history
const RECV_SECS = 120, QUIET_SECS = 900;   // status thresholds

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt = n => Number(n).toLocaleString("en-US");

/* ---------------- Auth ---------------- */
let csrfToken = "", me = null;
let sessionIdleOn = false, lastTouch = 0;
// Slide the idle timeout on real user activity (not background polling),
// throttled to at most once a minute.
function noteActivity() {
  if (!sessionIdleOn) return;
  const now = Date.now();
  if (now - lastTouch < 60000) return;
  lastTouch = now;
  apiSend("POST", "/api/session/touch")
    .then(r => { if (r && r.status === 401) toLogin(); })
    .catch(() => {});
}
function toLogin() { window.location.replace("/login"); }
// Returns true if the response indicates the session is gone (caller aborts).
function gone(res) { if (res.status === 401) { toLogin(); return true; } return false; }
async function apiSend(method, url, body) {
  return fetch(url, {
    method,
    headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken },
    body: body === undefined ? undefined : JSON.stringify(body),
  });
}
async function loadMe() {
  let res;
  try { res = await fetch("/api/me"); } catch (e) { return; }
  if (gone(res)) return;
  const data = await res.json();
  me = data.user; csrfToken = data.csrf_token || "";
  sessionIdleOn = !!(data.session && data.session.idle_minutes > 0);
  if (sessionIdleOn) { lastTouch = 0; noteActivity(); }
  $("avatar").textContent = (me.username || "?").trim().charAt(0) || "?";
  $("userMenuBtn").title = me.username;
  $("who").innerHTML = `${esc(me.username)}<span class="rl">${esc(me.role)}</span>`;
  $("whoEmail").textContent = me.email || "no email set";
  $("usersBtn").style.display = me.role === "admin" ? "" : "none";
  $("userbar").style.display = "";
  if (me.must_change_pw) { openPw(true); }
}
function toggleUserMenu(open) {
  const m = $("userMenu");
  const show = open === undefined ? !m.classList.contains("open") : open;
  m.classList.toggle("open", show);
  $("userMenuBtn").setAttribute("aria-expanded", show ? "true" : "false");
}
async function setMyEmail() {
  const email = window.prompt("Your email (used for password reset; blank to clear):", me && me.email ? me.email : "");
  if (email === null) return;
  const res = await apiSend("POST", "/api/users/set_email",
    { id: me.id, email: email.trim() });
  if (gone(res)) return;
  const data = await res.json();
  if (!res.ok) { showError(new Error(data.error || "Could not update email.")); return; }
  loadMe();
}

let view = "overview";      // "overview" or a device name
let stats = null;
let events = [], cursor = 0, liveTimer = null;
// Bumped on every view/filter change; in-flight fetches capture it and
// discard their response if it changed, so a slow reply for the previous
// device can never paint rows into the newly selected one.
let fetchGen = 0;

function statusOf(dev, now) {
  if (!dev.last_seen) return { cls:"nodata", label:"no data" };
  const age = now - dev.last_seen;
  if (age <= RECV_SECS) return { cls:"receiving", label:"receiving" };
  if (age <= QUIET_SECS) return { cls:"quiet", label:"quiet" };
  return { cls:"stale", label:"stale" };
}
function relTime(ts, now) {
  if (!ts) return "never";
  const s = Math.max(0, now - ts);
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s/60) + "m ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
}

/* ---------------- Tabs ---------------- */
function renderTabs() {
  const devs = stats ? stats.devices : [];
  const now = stats ? stats.now : 0;
  let h = `<button class="tab${view==="overview"?" active":""}" data-view="overview">Overview</button>`;
  h += devs.map(d => {
    const st = statusOf(d, now);
    return `<button class="tab${view===d.name?" active":""}" data-view="${esc(d.name)}">
      <span class="dot s-${st.cls}"></span>${esc(d.name)}</button>`;
  }).join("");
  $("tabs").innerHTML = h;
  $("tabs").querySelectorAll(".tab").forEach(b =>
    b.addEventListener("click", () => go(b.dataset.view)));
}

/* ---------------- Overview ---------------- */
function renderOverview() {
  if (!stats) return;
  const now = stats.now, devs = stats.devices;
  const receiving = devs.filter(d => statusOf(d, now).cls === "receiving").length;
  const span = stats.oldest ? Math.round((stats.newest - stats.oldest)/86400*10)/10 + "d span" : "no data";
  const tiles = [
    ["Systems receiving", receiving + " / " + devs.length, "active in last 2 min"],
    ["Events / min", fmt(stats.events_last_min), "across the fleet"],
    ["Events received", fmt(stats.parsed), span],
    ["Retention", stats.retention_days + " days", stats.max_events ? "cap " + fmt(stats.max_events) : "time-based"],
    ["Dropped", fmt(stats.dropped), "queue overflow"],
    ["Unparsed", fmt(stats.unparsed), "kept for diagnosis"],
  ];
  $("tiles").innerHTML = tiles.map(([l,v,s]) =>
    `<div class="card tile"><div class="l">${esc(l)}</div>
     <div class="v">${esc(v)}</div><div class="s">${esc(s)}</div></div>`).join("");
  $("sysGrid").innerHTML = devs.map(d => {
    const st = statusOf(d, now);
    return `<div class="sys-card ${st.cls}" data-view="${esc(d.name)}">
      <div class="name">${esc(d.name)}</div>
      <div class="meta">${esc(VENDOR_LABEL[d.vendor]||d.vendor)} · udp/${d.port}</div>
      <div class="row">
        <span class="pill"><span class="dot s-${st.cls}"></span>${st.label}</span>
        <span class="sub">${relTime(d.last_seen, now)}</span>
      </div>
      <div class="row">
        <span><span class="big rate">${fmt(d.events_last_min)}</span> <span class="sub">/min</span></span>
        <span class="sub">${fmt(d.events)} total</span>
      </div>
    </div>`;
  }).join("");
  $("sysGrid").querySelectorAll(".sys-card").forEach(c =>
    c.addEventListener("click", () => go(c.dataset.view)));
}

function renderFleetPill() {
  if (!stats) return;
  const now = stats.now, devs = stats.devices;
  const receiving = devs.filter(d => statusOf(d, now).cls === "receiving").length;
  const cls = receiving === devs.length ? "s-receiving"
            : receiving === 0 ? "s-stale" : "s-quiet";
  $("fleetPill").innerHTML = `<span class="dot ${cls}"></span> ${receiving}/${devs.length} receiving`;
}

/* ---------------- System live log ---------------- */
function deviceByName(name) {
  return (stats ? stats.devices : []).find(d => d.name === name);
}
function currentFilters() {
  return { src:$("fSrc").value.trim(), dst:$("fDst").value.trim(),
           proto:$("fProto").value.trim(), port:$("fPort").value.trim(),
           action:$("fAct").value, rule:$("fRule").value.trim() };
}
function filterQuery() {
  const f = currentFilters(), p = new URLSearchParams();
  p.set("device", view);
  for (const k in f) if (f[k]) p.set(k, f[k]);
  return p;
}
function rowHtml(e) {
  const cls = e.action === "Allow" ? "ev-allow" : BLOCKED.has(e.action) ? "ev-block"
    : e.action === "NAT" ? "ev-nat" : "";
  return `<tr class="${cls}">
    <td class="mono">${new Date(e.ts*1000).toLocaleTimeString()}</td>
    <td class="ip">${esc(e.src)}</td><td class="ip">${esc(e.dst)}</td>
    <td>${esc(e.proto)}</td>
    <td class="num port">${e.dst_port >= 0 ? e.dst_port : "—"}</td>
    <td><span class="badge"><span class="dot" style="background:${ACTION_COLOR[e.action]||"var(--muted)"}"></span>${esc(e.action)}</span></td>
    <td>${esc(e.rule)}</td></tr>`;
}
let loading = false, windowHasMore = false, olderInFlight = false;
function renderLog() {
  // Live tail keeps only the newest SHOW rows in the DOM; a history window
  // shows everything that's been loaded (bounded by WINDOW_MAX).
  const isLive = $("fMode").value === "live";
  const shown = isLive ? events.slice(-SHOW).reverse() : events.slice().reverse();
  $("meta").textContent = loading ? "querying…"
    : `${shown.length} shown / ${events.length} loaded`;
  const body = $("log").querySelector("tbody");
  body.innerHTML = shown.length ? shown.map(rowHtml).join("")
    : `<tr><td colspan="7" class="empty-note">${loading
        ? "Querying the database…" : "No matching events yet."}</td></tr>`;
}
function updateLoadMore() {
  const bar = $("loadMoreBar"), btn = $("loadOlderBtn"), note = $("loadMoreNote");
  if ($("fMode").value === "live") { bar.style.display = "none"; return; }
  if (events.length >= WINDOW_MAX) {           // hit the on-screen cap
    bar.style.display = "flex"; btn.style.display = "none";
    note.textContent = `Showing the most recent ${WINDOW_MAX.toLocaleString()} — `
      + `narrow the filter or Download CSV for the full window.`;
  } else if (windowHasMore) {                   // more older events exist
    bar.style.display = "flex"; btn.style.display = ""; note.textContent = "";
  } else {
    bar.style.display = "none";
  }
}
let liveInFlight = false;
async function pollLive() {
  if (view === "overview" || $("fMode").value !== "live" || $("fPause").checked) return;
  // Single-flight: never let the 2s timer stack a second request on top of
  // one that hasn't returned, or slow polls would pile up on the server.
  if (liveInFlight) return;
  liveInFlight = true;
  const gen = fetchGen;
  try {
    const p = filterQuery(); p.set("since", cursor);
    const r = await fetch("/api/live?" + p); if (gone(r)) return;
    const res = await r.json();
    if (gen !== fetchGen) return;           // view/filters changed mid-flight
    if (res.error) throw new Error(res.error);
    if (res.cursor < cursor) events = [];   // db pruned / restarted
    cursor = res.cursor;
    if (res.events.length) {
      events.push(...res.events);
      if (events.length > KEEP) events = events.slice(-KEEP);
      renderLog();
    }
    $("banner").style.display = "none";
  } catch (e) { showError(e); }
  finally { liveInFlight = false; }
}
async function loadWindow() {
  const gen = fetchGen;
  try {
    const p = filterQuery(); p.set("window", $("fMode").value);
    p.set("limit", String(WINDOW_BATCH));
    const r = await fetch("/api/events?" + p); if (gone(r)) return;
    const res = await r.json();
    if (gen !== fetchGen) return;           // view/filters changed mid-flight
    if (res.error) throw new Error(res.error);
    events = res.events.slice().reverse();   // oldest-first
    windowHasMore = res.events.length >= WINDOW_BATCH;
    loading = false;
    renderLog();
    updateLoadMore();
    $("banner").style.display = "none";
  } catch (e) { loading = false; renderLog(); showError(e); }
}
async function loadOlder() {
  if (olderInFlight || !windowHasMore || $("fMode").value === "live"
      || !events.length) return;
  olderInFlight = true;
  const gen = fetchGen, btn = $("loadOlderBtn");
  btn.disabled = true; btn.textContent = "Loading…";
  try {
    const p = filterQuery(); p.set("window", $("fMode").value);
    p.set("limit", String(WINDOW_BATCH));
    p.set("before", String(events[0].id));   // events[0] is the oldest loaded
    const r = await fetch("/api/events?" + p); if (gone(r)) return;
    const res = await r.json();
    if (gen !== fetchGen) return;
    if (res.error) throw new Error(res.error);
    events = res.events.slice().reverse().concat(events);   // prepend older
    windowHasMore = res.events.length >= WINDOW_BATCH;
    renderLog();
    updateLoadMore();
  } catch (e) { showError(e); }
  finally {
    olderInFlight = false;
    btn.disabled = false; btn.textContent = "Load older";
  }
}
function refetchSystem() {
  fetchGen++;                // any in-flight poll discards its result (gen)
  liveInFlight = false;      // ...and release the single-flight slot so this
                             // user-driven refetch runs immediately (the slot
                             // only exists to stop the 2s timer stacking)
  events = []; cursor = 0;
  windowHasMore = false;
  // Historical-window queries can take a moment on a big DB — show a
  // "querying…" state instead of a misleading "no events" while it runs.
  loading = ($("fMode").value !== "live");
  renderLog();   // clear the table now — an empty device gets no later render
  updateLoadMore();
  const p = filterQuery();
  p.set("window", $("fMode").value === "live" ? "86400" : $("fMode").value);
  $("csvLink").href = "/api/events.csv?" + p;
  if ($("fMode").value === "live") pollLive(); else loadWindow();
}

/* ---------------- Navigation ---------------- */
function go(target) {
  view = target;
  const isSys = target !== "overview";
  $("page-overview").style.display = isSys ? "none" : "";
  $("page-system").style.display = isSys ? "" : "none";
  renderTabs();
  if (isSys) {
    const d = deviceByName(target);
    $("sysTitle").textContent = target;
    $("sysMeta").textContent = d ? `${VENDOR_LABEL[d.vendor]||d.vendor} · udp/${d.port}` : "";
    updateSysStatus();
    ["fSrc","fDst","fProto","fPort","fRule"].forEach(id => $(id).value = "");
    $("fAct").value = ""; $("fMode").value = "live"; $("fPause").checked = false;
    refetchSystem();
  } else {
    renderOverview();
  }
}
function updateSysStatus() {
  if (view === "overview" || !stats) return;
  const d = deviceByName(view);
  if (!d) return;
  const st = statusOf(d, stats.now);
  $("sysStatus").innerHTML = `<span class="dot s-${st.cls}"></span>${st.label}`;
}

function showError(e) {
  $("banner").textContent = "Error: " + e.message;
  $("banner").style.display = "block";
}

async function loadStats() {
  try {
    const r = await fetch("/api/stats"); if (gone(r)) return;
    const s = await r.json();
    stats = s;
    renderTabs(); renderFleetPill();
    if (view === "overview") renderOverview(); else updateSysStatus();
    $("updated").textContent = "updated " + new Date().toLocaleTimeString();
    $("banner").style.display = "none";
  } catch (e) { showError(e); }
}

/* filter + mode listeners (system view) */
$("fMode").addEventListener("change", () => {
  clearInterval(liveTimer); liveTimer = null;
  refetchSystem();
  if ($("fMode").value === "live") liveTimer = setInterval(pollLive, 2000);
});
["fSrc","fDst","fProto","fPort","fRule"].forEach(id => $(id).addEventListener("input", debounce(refetchSystem, 350)));
$("fAct").addEventListener("change", refetchSystem);
$("fPause").addEventListener("change", () => { if (!$("fPause").checked) pollLive(); });
$("fClear").addEventListener("click", () => {
  ["fSrc","fDst","fProto","fPort","fRule"].forEach(id => $(id).value = ""); $("fAct").value = ""; refetchSystem();
});
$("loadOlderBtn").addEventListener("click", loadOlder);
$("backBtn").addEventListener("click", () => go("overview"));
function debounce(fn, ms) { let t; return () => { clearTimeout(t); t = setTimeout(fn, ms); }; }

/* ---------------- Auth UI ---------------- */
function modalMsg(id, text, ok) {
  const m = $(id);
  m.textContent = text; m.className = "msg" + (ok ? " ok" : "");
  m.style.display = text ? "block" : "none";
}
let pwForced = false;
function openPw(forced) {
  pwForced = !!forced;
  ["pwCur","pwNew","pwNew2"].forEach(id => $(id).value = "");
  modalMsg("pwMsg", "");
  $("pwCancel").style.display = forced ? "none" : "";
  $("pwModal").classList.add("open");
}
function closePw() { if (!pwForced) $("pwModal").classList.remove("open"); }
["click", "keydown", "pointerdown"].forEach(ev =>
  document.addEventListener(ev, noteActivity, { passive: true }));
document.addEventListener("visibilitychange", () => { if (!document.hidden) noteActivity(); });
$("userMenuBtn").addEventListener("click", (e) => { e.stopPropagation(); toggleUserMenu(); });
// Clicking any menu item runs its action and closes the dropdown.
$("userMenu").querySelectorAll(".menu-item").forEach(b =>
  b.addEventListener("click", () => toggleUserMenu(false)));
document.addEventListener("click", (e) => {
  if (!$("userbar").contains(e.target)) toggleUserMenu(false);
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") toggleUserMenu(false);
});
$("emailBtn").addEventListener("click", setMyEmail);
$("pwBtn").addEventListener("click", () => openPw(false));
$("pwCancel").addEventListener("click", closePw);
$("pwSave").addEventListener("click", async () => {
  const cur = $("pwCur").value, n1 = $("pwNew").value, n2 = $("pwNew2").value;
  if (n1.length < 12) return modalMsg("pwMsg", "New password must be at least 12 characters.");
  if (n1 !== n2) return modalMsg("pwMsg", "New passwords do not match.");
  try {
    const res = await apiSend("POST", "/api/change_password",
      { current_password: cur, new_password: n1 });
    if (gone(res)) return;
    const data = await res.json();
    if (!res.ok) return modalMsg("pwMsg", data.error || "Could not change password.");
    modalMsg("pwMsg", "Password changed. Redirecting to sign in…", true);
    setTimeout(toLogin, 900);
  } catch (e) { modalMsg("pwMsg", "Network error."); }
});

function openUsers() {
  modalMsg("usersMsg", "");
  ["nuName","nuPass","nuEmail"].forEach(id => $(id).value = ""); $("nuRole").value = "user";
  $("usersModal").classList.add("open");
  refreshUsers();
}
async function refreshUsers() {
  const res = await fetch("/api/users"); if (gone(res)) return;
  if (res.status === 403) { modalMsg("usersMsg", "Admin access required."); return; }
  const data = await res.json();
  $("userRows").innerHTML = (data.users || []).map(u => `
    <tr><td><b>${esc(u.username)}</b></td>
    <td>${u.id === me.id
      ? `<span class="tag">${esc(u.role)}</span>`
      : `<select class="rolesel" data-role="${u.id}" data-name="${esc(u.username)}">
           <option value="user"${u.role === "user" ? " selected" : ""}>user</option>
           <option value="admin"${u.role === "admin" ? " selected" : ""}>admin</option>
         </select>`}</td>
    <td>${u.email ? esc(u.email) : '<span class="sub">no email</span>'}</td>
    <td>${u.must_change_pw ? '<span class="tag">must change pw</span>' : ""}</td>
    <td style="text-align:right">
      <button class="linkbtn" data-email="${u.id}" data-cur="${esc(u.email || "")}">Email</button>
      ${u.id === me.id ? ' <span class="sub">you</span>'
        : ` · <button class="linkbtn" data-del="${u.id}" data-name="${esc(u.username)}">Delete</button>`}
    </td></tr>`).join("");
  $("userRows").querySelectorAll("[data-del]").forEach(b =>
    b.addEventListener("click", () => deleteUser(b.dataset.del, b.dataset.name)));
  $("userRows").querySelectorAll("[data-email]").forEach(b =>
    b.addEventListener("click", () => editEmail(b.dataset.email, b.dataset.cur)));
  $("userRows").querySelectorAll("[data-role]").forEach(s =>
    s.addEventListener("change", () => setRole(s.dataset.role, s.value, s.dataset.name)));
}
async function setRole(id, role, name) {
  const res = await apiSend("POST", "/api/users/set_role",
    { id: Number(id), role });
  if (gone(res)) return;
  const data = await res.json();
  if (!res.ok) {
    modalMsg("usersMsg", data.error || "Could not change role.");
    refreshUsers();   // revert the dropdown to the server's value
    return;
  }
  modalMsg("usersMsg", `${name} is now ${role}.`, true);
  refreshUsers();
}
async function editEmail(id, current) {
  const email = window.prompt("Email address for this user (blank to clear):", current || "");
  if (email === null) return;
  const res = await apiSend("POST", "/api/users/set_email",
    { id: Number(id), email: email.trim() });
  if (gone(res)) return;
  const data = await res.json();
  if (!res.ok) return modalMsg("usersMsg", data.error || "Could not update email.");
  modalMsg("usersMsg", "Email updated.", true);
  refreshUsers();
}
async function deleteUser(id, name) {
  if (!window.confirm("Delete user " + name + "?")) return;
  const res = await apiSend("DELETE", "/api/users/" + encodeURIComponent(id));
  if (gone(res)) return;
  const data = await res.json();
  if (!res.ok) return modalMsg("usersMsg", data.error || "Delete failed.");
  modalMsg("usersMsg", "Deleted " + name + ".", true);
  refreshUsers();
}
$("usersBtn").addEventListener("click", openUsers);
$("usersClose").addEventListener("click", () => $("usersModal").classList.remove("open"));
$("nuCreate").addEventListener("click", async () => {
  const username = $("nuName").value.trim(), password = $("nuPass").value,
        role = $("nuRole").value, email = $("nuEmail").value.trim();
  if (password.length < 12) return modalMsg("usersMsg", "Password must be at least 12 characters.");
  try {
    const res = await apiSend("POST", "/api/users", { username, password, role, email });
    if (gone(res)) return;
    const data = await res.json();
    if (!res.ok) return modalMsg("usersMsg", data.error || "Could not create user.");
    modalMsg("usersMsg", "Created " + username + ".", true);
    $("nuName").value = ""; $("nuPass").value = "";
    refreshUsers();
  } catch (e) { modalMsg("usersMsg", "Network error."); }
});
$("logoutBtn").addEventListener("click", async () => {
  try { await apiSend("POST", "/api/logout"); } catch (e) {}
  toLogin();
});

loadMe();
loadStats();
setInterval(loadStats, 5000);
liveTimer = setInterval(pollLive, 2000);
</script>
</body>
</html>
